name: Build YunTingFlow APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Extract source code
        run: |
          rm -rf build-src
          mkdir build-src
          unzip -q YunTingFlow-source.zip -d build-src

      - name: Build debug APK
        working-directory: build-src/YunTingFlow
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YunTingFlow-debug-apk
          path: build-src/YunTingFlow/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
